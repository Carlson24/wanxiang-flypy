# Rime schema
# encoding: utf-8
# 方案说明
schema:
  schema_id: wanxiang_pro
  name: 小鹤音形·万象PRO
  version: "LTS"
  author:
    - amzxyz
    - Carlson24
  description: |
    小鹤音形+万象拼音Pro
  dependencies:
    - wanxiang_mixedcode # 中英文混合词汇
    - wanxiang_reverse # 部件拆字，反查及辅码
    - wanxiang_english # 中英文混合词汇

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA1234567890`;/\@|›
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA/@|›
  delimiter: " '"
  visual_delimiter: " "
  algebra:
    __patch:
      - "wanxiang_algebra:/模糊音_in_ing"
      - "wanxiang_algebra:/flypy"

grammar:
  language: wanxiang-lts-zh-hans
  collocation_max_length: 8
  collocation_min_length: 2
  collocation_penalty: -16
  non_collocation_penalty: -8
  weak_collocation_penalty: -100
  rear_penalty: -20

switches:
  - name: ascii_mode
    states: [中文, 英文]
    reset: 0
  - name: ascii_punct
    states: [中标, 英标]
    reset: 0
  - name: full_shape
    states: [半角, 全角]
    reset: 0
  - name: emoji
    states: [表情关, 表情开]
    reset: 0
  - name: chinese_english
    states: [翻译关, 翻译开]
    reset: 0
  - name: super_tips
    states: [提示关, 提示开]
    reset: 1
  - name: prediction
    states: [预测关, 预测开]
    reset: 1
  - name: char_priority
    states: [词组先, 单字先]
    reset: 0
  - options: [raw_input, tone_display, full_pinyin]
    states: [原编码, 有声调, 无声调]
    reset: 0
  - options: [comment_off, fuzhu_hint, tone_hint]
    states: [注释关, 辅助开, 读音开]
    reset: 2
  - options: [s2s, s2t, s2hk, s2tw]
    states: [简体, 通繁, 港繁, 臺繁]
    reset: 0

key_binder:
  import_preset: default
  shijian_keys: ["/", "o"]
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: always, toggle: ascii_punct, accept: Control+Shift+3 } # 切换中英标点
    - { when: always, toggle: s2t, accept: Control+Shift+4 }
    - { when: composing, accept: Alt+Left, send: Shift+Left }
    - { when: composing, accept: Alt+Right, send: Shift+Right }
    - { when: composing, accept: Control+w, send: Control+BackSpace }
    - { when: has_menu, accept: semicolon, send: 2 }
    - { when: has_menu, accept: "Control+e", toggle: chinese_english }
    - { when: always, accept: Shift+space, select: .next } #下一个方案
    - { when: has_menu, accept: "Tab", send: "Control+Right" }
    - { when: composing, accept: "Tab", send: "Control+Right" }
    - {
        when: composing,
        accept: "Control+Tab",
        send_sequence: "{Home}{Shift+Right}{1}{Shift+Right}"
      }
    - {
        match: "^.*`$",
        accept: "`",
        send_sequence: "{BackSpace}{Home}{`}{`}{End}"
      }
    - { match: "^/$", accept: "/", send_sequence: "{space}" }
    - { match: "^\\|$", accept: "|", send_sequence: "{space}" }

engine:
  processors:
    - lua_processor@*wanxiang.force_upper_aux
    - lua_processor@*wanxiang.user_predict*P
    - lua_processor@*wanxiang.super_processor
    - lua_processor@*wanxiang.partial_commit
    - lua_processor@*wanxiang.super_sequence*P
    - lua_processor@*wanxiang.super_tips
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@*wanxiang.key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@wanxiang_reverse
    - affix_segmentor@add_user_dict
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - lua_translator@*wanxiang.user_predict*T
    - lua_translator@*wanxiang.version_display
    - lua_translator@*wanxiang.shijian
    - lua_translator@*wanxiang.unicode
    - lua_translator@*wanxiang.number_translator
    - lua_translator@*wanxiang.super_calculator
    - lua_translator@*wanxiang.input_statistics
    - table_translator@custom_phrase
    - table_translator@wanxiang_english
    - table_translator@wanxiang_mixedcode
    - reverse_lookup_translator@wanxiang_reverse
    - script_translator@user_dict_set
    - script_translator@add_user_dict
  filters:
    - lua_filter@*wanxiang.auto_phrase
    - lua_filter@*wanxiang.super_lookup
    - lua_filter@*wanxiang.super_english
    - lua_filter@*wanxiang.super_comment_preedit
    - lua_filter@*wanxiang.super_replacer
    - lua_filter@*wanxiang.super_filter
    - lua_filter@*wanxiang.super_sequence*F
    - lua_filter@*wanxiang.user_predict*F
    - uniquifier

calculator:
  trigger: "="

force_upper_aux:
  hotkey: "comma"
  symbol: "›"

input_stats:
  db_name: "lua/data/stats"
  triggers:
    clear: "/qctj"
    today: "/rtj"
    week: "/ztj"
    month: "/ytj"
    year: "/ntj"
    total: "/tj"
    history: "/htj"

super_comment:
  candidate_length: 10
  corrector_type: "〔comment〕"
  cand_type:
    user_phrase: " ⁑"
    sentence: " ♨"
    phrase: " ▪"
    table: " ⋄"
    user_table: " ✬"
    completion: " ⋙"
    abbrev: " 𝅘𝅥𝅮"
    predict: " §"
    fallback: " ~"

super_processor:
  enable_backspace_limit: true
  enable_seg_loop: true
  enable_tone_fallback: true
  enable_predict_space: false
  kp_number_mode: auto
  limit_repeated: "16,64"
  select_character: "bracketleft, bracketright"

super_replacer:
  db_name: "lua/data/replacer"
  delimiter: "|"
  comment_format: "〔%s〕"
  chain: true
  rules:
    - option: emoji
      mode: append
      comment_mode: none
      tags: [abc]
      prefix: "_em_"
      files:
        - lua/data/emoji.txt
    - option: chinese_english
      mode: append # <--- 添加注释模式
      comment_mode: none
      tags: [abc]
      prefix: "_en_"
      files:
        - lua/data/english_chinese.txt
        - lua/data/chinese_english.txt
    - option: true
      mode: append
      comment_mode: none
      tags: [abc]
      prefix: "_ot_"
      files:
        - lua/data/others.txt
    - option: [s2t, s2hk, s2tw]
      mode: replace
      comment_mode: append
      sentence: true
      tags: [abc]
      prefix: "_s2t_"
      files:
        - lua/data/STCharacters.txt
        - lua/data/STPhrases.txt
    - option: s2hk
      mode: replace
      comment_mode: append
      sentence: true
      tags: [abc]
      prefix: "_s2hk_"
      files:
        - lua/data/HKVariants.txt
    - option: s2tw
      mode: replace
      comment_mode: append
      sentence: true
      tags: [abc]
      prefix: "_s2tw_"
      files:
        - lua/data/TWVariants.txt
    - option: true
      mode: abbrev
      tags: [abc]
      prefix: "_abbr_"
      abbrev_rule: "100,1"
      files:
        - user_abbrev.txt # 用户简码
        - lua/data/flypy_fixed.txt
        - lua/data/flypy_osymbols.txt
    - option: true
      mode: comment
      comment_mode: none
      tags: [abc]
      prefix: "_comt_"
      files:
        - lua/data/flypy_commit.txt

super_sequence:
  db_name: "lua/data/sequence"
  up: "Control+j" # 上移
  down: "Control+k" # 下移
  reset: "Control+l" # 重置
  pin: "Control+p" # 置顶

super_tips:
  db_name: "lua/data/tips"
  tips_key: "period"
  files:
    - lua/data/tips_show.txt
    - lua/data/tips_chaifen.txt
  disabled_types: ""

date_formats:
  - "Y 年 n 月 j 日"
  - "n 月 j 日"
  - "Y 年 m 月 d 日"
  - "m 月 d 日"
  - "Y-m-d"
  - "m-d"
  - "Y/m/d"
  - "m/d"
datetime_formats:
  - "Y 年 m 月 d 日 H 时 M 分"
  - "Y-m-d H:M:S"
time_formats:
  - "H 时 M 分"
  - "H:M"
  - "H 时 M 分 S 秒"
  - "H:M:S"

tone_preedit:
  "7": "①"
  "8": "②"
  "9": "③"
  "0": "④"

user_predict:
  db_name: "lua/data/predict"
  enable_post_predict: true
  enable_context_reorder: true
  enable_fallback_reorder: false
  max_candidates: 5
  max_predictions: 10
  expiry_days: 90
  activation_days: 7
  max_memory_branches: 15
  decay_rate: 0.85
  enable_predict_space: true
  context_timeout: 5000
  custom_classifiers: ""

quick_symbol_text:
  trigger: "^|([a-z])$"
  symkey:
    q: "repeat"
    w: "？"
    e: "（"
    r: "）"
    t: "~"
    y: "·"
    u: "『"
    i: "』"
    o: "〖"
    p: "〗"
    a: "！"
    s: "……"
    d: "、"
    f: "“"
    g: "”"
    h: "‘"
    j: "’"
    k: "【"
    l: "】"
    z: "。”"
    x: "？”"
    c: "！”"
    v: "——"
    b: "%"
    n: "《"
    m: "》"

paired_symbols:
  trigger: "|"
  symkey:
    # ===== 基本括号与引号 =====
    a: "[]" # 方括号
    b: "【】" # 黑方头括号
    c: "❲❳" # 双大括号 / 装饰括号
    d: "〔〕" # 方头括号
    e: "⟮⟯" # 小圆括号 / 装饰括号
    f: "⟦⟧" # 双方括号 / 数学集群括号
    g: "「」" # 直角引号
    # h: 预留用于 Markdown 一级标题
    i: "『』" # 双直角引号
    j: "<>" # 尖括号
    k: "《》" # 书名号（双）
    l: "〈〉" # 书名号（单）
    m: "‹›" # 法文单书名号
    n: "«»" # 法文双书名号
    o: "⦅⦆" # 白圆括号
    p: "⦇⦈" # 白方括号
    q: "()" # 圆括号
    r: "|儿" #儿化候选
    s: "［］" # 全角方括号
    t: "⟨⟩" # 数学角括号
    u: "〈〉" # 数学尖括号
    v: "〖〗" # 装饰花括号
    w: "（）" # 全角圆括号
    x: "｛｝" # 全角花括号
    y: "⟪⟫" # 双角括号
    z: "{}" # 花括号

    # ===== 扩展括号族 / 引号 =====
    dy: "''" # 英文单引号
    sy: '""' # 英文双引号
    zs: "“”" # 中文弯双引号
    zd: "‘’" # 中文弯单引号
    fy: "``" # 反引号

    # ===== 双字母括号族 =====
    aa: "〚〛" # 双中括号
    bb: "〘〙" # 双中括号（小）
    cc: "〚〛" # 双中括号（重复，可用于 Lua 匹配）
    dd: "❨❩" # 小圆括号装饰
    ee: "❪❫" # 小圆括号装饰
    ff: "❬❭" # 小尖括号装饰
    gg: "⦉⦊" # 双弯方括号
    fa: "⦋⦌" # 双弯方括号
    ii: "⦍⦎" # 双弯方括号
    jj: "⦏⦐" # 双弯方括号
    kk: "⦑⦒" # 双弯方括号
    ll: "❮❯" # 小尖括号装饰
    mm: "⌈⌉" # 上取整 / 数学符号
    nn: "⌊⌋" # 下取整 / 数学符号
    oo: "⦗⦘" # 双方括号装饰（补齐）
    pp: "⦙⦚" # 双方括号装饰（补齐）
    qq: "⟬⟭" # 小双角括号
    rr: "❴❵" # 花括号装饰
    ss: "⌜⌝" # 数学上角符号
    tt: "⌞⌟" # 数学下角符号
    uu: "⸢⸣" # 装饰方括号
    vv: "⸤⸥" # 装饰方括号
    ww: "﹁﹂" # 中文书名号 / 注释引号
    xx: "﹃﹄" # 中文书名号 / 注释引号
    yy: "⌠⌡" # 数学 / 程序符号
    zz: "⟅⟆" # 数学 / 装饰括号

    # ===== Markdown / 标记 =====
    md: "**|**" # Markdown 粗体
    jc: "**|**" # 加粗
    it: "__|__" # 斜体
    st: "~~|~~" # 删除线
    eq: "==|==" # 高亮
    ln: "`|`" # 行内代码
    cb: "```|```" # 代码块
    qt: "> |" # 引用
    ul: "- |" # 无序列表项
    ol: "1. |" # 有序列表项
    lk: "[|](url)" # 链接
    im: "![|](img)" # 图片
    h: "# |" # 一级标题
    hh: "## |" # 二级标题
    hhh: "### |" # 三级标题
    hhhh: "#### |" # 四级标题
    sp: "\\|" # 反斜杠转义
    br: "|  " # 换行
    cm: "<!--|-->" # 注释

    # ===== 运算与标记符 =====
    pl: "++"
    mi: "--"
    sl: "//"
    bs: "\\\\"
    at: "@@"
    dl: "$$"
    pc: "%%"
    an: "&&"
    cr: "^^"
    cl: "::"
    sc: ";;"
    ex: "!!"
    qu: "??"
    sb: "sb"

translator:
  dictionary: wanxiang_pro
  enable_completion: true
  enable_user_dict: false
  contextual_suggestions: false
  max_homophones: 8
  max_homographs: 8
  enable_correction: false
  initial_quality: 4
  spelling_hints: 50
  always_show_comments: true
  comment_format:

custom_phrase:
  dictionary: ""
  user_dict: user_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99

wanxiang_english:
  dictionary: wanxiang_english
  user_dict: wanxiang_en
  enable_completion: true
  enable_sentence: true
  initial_quality: 2.1
  comment_format:
    - xform/^~.+$//
  english_spacing: off
  spacing_timeout: 5
  max_candidates: 0
  trigger: "\\"

wanxiang_mixedcode:
  dictionary: wanxiang_mixedcode
  db_class: stabledb
  enable_completion: true
  enable_sentence: false
  initial_quality: 2
  comment_format:
    - xform/.*//

wanxiang_reverse:
  tag: wanxiang_reverse
  dictionary: wanxiang_reverse
  enable_completion: true
  prefix: "`"
  tips: "〔反查：拆分|笔画〕"

wanxiang_lookup:
  tags: [abc, add_user_dict]
  key: "`"
  lookup: [wanxiang_reverse]
  enable_tone: true
  data_source: ["aux", "db"]

recognizer:
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]+)$"
    wanxiang_reverse: "^`[A-Za-z]*$"
    add_user_dict: "^``[A-Za-z/`']*$"
    unicode: "^U[a-fA-F0-9]+"
    number: "^R[0-9]+[.]?[0-9]*"
    sjc: "^[/o]rc\\d+[-+=op]?$"
    yr1: "^N0[1-9]?0?[1-9]?"
    yr2: "^N1[02]?0?[1-9]?"
    yr3: "^N0[1-9]?[1-2]?[1-9]?"
    yr4: "^N1[02]?[1-2]?[1-9]?"
    yr5: "^N0[1-9]?3?[01]?"
    yr6: "^N1[02]?3?[01]?"
    nyr1: "^N19?[0-9]?[0-9]?[0-1]?[0-9]?[0-9]?[0-9]?"
    nyr2: "^N20?[0-9]?[0-9]?[0-1]?[0-9]?[0-9]?[0-9]?"
    calculator: "^=.*$"
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$"
    htj: "^/htj.*$"

punctuator:
  digit_separators: ":,."
  __include: wanxiang_symbols:/symbol_table

editor:
  bindings:
    space: confirm # 空格键：上屏候选项
    Return: commit_raw_input # 回车键：上屏原始输入
    Control+Return: commit_script_text # Ctrl+回车键：上屏变换后输入（经过 preedit转换的）
    Control+Shift+Return: commit_comment # Ctrl+Shift+回车键：上屏 comment
    BackSpace: revert # 退格键：向前删除（撤消上次输入）
    Delete: delete # Delete 键：向后删除
    Control+BackSpace: back_syllable # Ctrl+退格键：删除一个音节
    Control+Delete: delete_candidate # Ctrl+Delete键：删除或降权候选项
    Escape: cancel # Esc 键：取消输入

navigator:
  bindings:
    Left: left_by_char_no_loop
    Right: right_by_char_no_loop
    Shift+Left: left_by_syllable
    Shift+Right: right_by_syllable

user_dict_set:
  dictionary: wanxiang_pro
  initial_quality: 2.5
  enable_completion: false
  enable_sentence: false
  core_word_length: 4
  max_word_length: 7
  contextual_suggestions: false
  max_homophones: 8
  max_homographs: 8
  spelling_hints: 50
  comment_format:
  enable_user_dict: true
  user_dict: wanxiang_cn

add_user_dict:
  tag: add_user_dict
  dictionary: wanxiang_pro
  initial_quality: -1
  user_dict: wanxiang_cn
  enable_completion: true
  enable_user_dict: true
  spelling_hints: 50
  enable_auto_phrase: true
  comment_format:
  prefix: "``"
  tips: "〔开始造词〕"
