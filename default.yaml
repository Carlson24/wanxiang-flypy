# Rime default settings
# encoding: utf-8

# 要比共享目录的同名文件的 config_version 大才可以生效
config_version: "LTS"

# 方案列表
schema_list:
  - schema: wanxiang_pro
  - schema: wanxiang_english

# 菜单
menu:
  page_size: 5 # 候选词个数，不得超过6个，7890代表声调
  alternative_select_labels: [➊, ➋, ➌, ➍, ➎, ➏, ➐, ➑, ➒, ➓]

# 万象状态面板相关
switcher:
  caption: 「万象状态面板」
  hotkeys:
    - Control+grave
  save_options: # 开关记忆（方案中的 switches），从万象状态面板（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
    - ascii_punct
    - emoji
    - full_shape
    - prediction
    - super_tips
    - abbrev
  fold_options: true # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
  abbreviate_options: true # 折叠时是否缩写选项
  option_list_separator: " / " # 折叠时的选项分隔符

ascii_composer:
  good_old_caps_lock: true # true | false
  switch_key:
    Caps_Lock: clear # commit_code | commit_text | clear
    Shift_L: commit_code # commit_code | commit_text | inline_ascii | clear | noop
    Shift_R: commit_code # commit_code | commit_text | inline_ascii | clear | noop
    Control_L: noop # commit_code | commit_text | inline_ascii | clear | noop
    Control_R: noop # commit_code | commit_text | inline_ascii | clear | noop

# 处理符合特定规则的输入码，如网址、反查
# 此处配置较为通用的选项，各方案中另增加了和方案功能绑定的 patterns。
recognizer:
  patterns:

# 快捷键
key_binder:
  bindings:
    # 翻页 - =
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: composing, accept: Control+k, toggle: xxxxx }

    # 将小键盘 0~9 . 映射到主键盘，数字金额大写的 Lua 如 R1234.5678 可使用小键盘输入
    - { accept: KP_0, send: 0, when: composing }
    - { accept: KP_1, send: 1, when: composing }
    - { accept: KP_2, send: 2, when: composing }
    - { accept: KP_3, send: 3, when: composing }
    - { accept: KP_4, send: 4, when: composing }
    - { accept: KP_5, send: 5, when: composing }
    - { accept: KP_6, send: 6, when: composing }
    - { accept: KP_7, send: 7, when: composing }
    - { accept: KP_8, send: 8, when: composing }
    - { accept: KP_9, send: 9, when: composing }
    - { accept: KP_Decimal, send: period, when: composing }
    - { accept: KP_Multiply, send: asterisk, when: composing }
    - { accept: KP_Add, send: plus, when: composing }
    - { accept: KP_Subtract, send: minus, when: composing }
    - { accept: KP_Divide, send: slash, when: composing }
    - { accept: KP_Enter, send: Return, when: composing }

# 按键映射详见： https://amzxyz.github.io/doc/key
